<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incident Analytics | Tourism Department</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8f9fa; }
        .header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 20px 0; }
        .container { max-width: 1400px; margin: 0 auto; padding: 30px 20px; }
        .card { background: white; border-radius: 10px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: 600; }
        .btn-primary { background: #667eea; color: white; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .stat-card { text-align: center; padding: 20px; background: #f8f9fa; border-radius: 10px; }
        .stat-value { font-size: 32px; font-weight: bold; color: #667eea; }
    </style>
</head>
<body>    <script src="universal-menu.js"></script>
    <header class="header">
        <div style="max-width: 1400px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h1>📊 Incident Analytics</h1>
                <p>Comprehensive Incident Data Analysis</p>
            </div>
            <button class="btn btn-primary" onclick="window.location.href='tourism-dashboard.html'">← Back</button>
        </div>
    </header>
    <main class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value">287</div>
                <div>Total Incidents (YTD)</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">23</div>
                <div>This Month</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">94.3%</div>
                <div>Resolution Rate</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">8.5min</div>
                <div>Avg Response Time</div>
            </div>
        </div>
        <div class="card">
            <h3>📈 Incident Trends</h3>
            <div style="height: 300px; background: #f8f9fa; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #666;">
                Interactive Analytics Dashboard
            </div>
        </div>
    </main>
    <!-- Universal Menu Script -->`n    <script src="universal-menu.js"></script>`n</body>
</html>
